---
layout: default
title: 首页
---

<h1>最新文章</h1>

{% if site.posts.size > 0 %}
  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <small>（{{ post.date | date: "%Y-%m-%d" }}）</small>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>暂时还没有发布文章。</p>
{% endif %}
