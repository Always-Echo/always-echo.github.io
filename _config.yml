theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai
title: Redscarf's homepage
tagline: AI · 工程 · 思考
description: 分享我的个人思考与实践
url: "https://always-echo.github.io"
baseurl: ""

theme_mode:
toc: true
paginate: 8

avatar: /assets/img/avatar.png
disqus:
  shortname:
giscus:
  repo:
  repo_id:
  category:
  category_id:

github:
  username: Always-Echo
social:
  name: Redscarf
  email: your-email@example.com
  links:
    - https://github.com/Always-Echo

analytics:
  google:
    id:

comments:
  provider:

pwa:
  enabled: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives
  - jekyll-include-cache

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
